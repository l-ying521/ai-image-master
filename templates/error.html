<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 · PixMagic</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #fff5f7 0%, #ffeef2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(255, 120, 140, 0.15);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .error-icon {
            font-size: 80px;
            background: linear-gradient(135deg, #ff6f91, #ff9a9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
        }

        .error-title {
            font-size: 32px;
            font-weight: 700;
            color: #4a3a42;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 16px;
            color: #6b4e5e;
            margin-bottom: 32px;
            line-height: 1.6;
            padding: 20px;
            background: rgba(255, 110, 140, 0.1);
            border-radius: 16px;
            border-left: 4px solid #ff6f91;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            outline: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff8da1, #ff6f91);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 110, 140, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 110, 140, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #ff6f91;
            border: 2px solid #ff6f91;
        }

        .btn-secondary:hover {
            background: rgba(255, 110, 140, 0.1);
        }

        @media (max-width: 768px) {
            .error-container {
                padding: 40px 24px;
            }
            .error-title {
                font-size: 24px;
            }
            .error-actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="error-title">出错了</h1>
        <div class="error-message">
            {{ error if error else '发生了一个未知错误，请稍后再试' }}
        </div>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> 返回首页
            </a>
            <button onclick="window.history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 返回上一页
            </button>
        </div>
    </div>
</body>
</html>
